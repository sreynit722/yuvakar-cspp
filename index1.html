<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YUVAKAR</title>
    <link rel="icon" href="SURAKA LOGO.webp" type="images/webp">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Times New Roman', Times, serif;
      }
      body {
        background: #0b1120;
        overflow: hidden;
      }
      
      @keyframes scaleUp {
        from {
          opacity: 0;
          transform: scale(1.05);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes revealDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes revealUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .intro-page {
        height: 100vh;
        background: #0b1120 url("./image/SURAKA b.jpg") center/cover no-repeat;
        position: relative;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: scaleUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(11, 17, 32, 0.45), rgba(11, 17, 32, 0.75));
        z-index: 1;
      }
      .intro-container {
        position: relative;
        z-index: 2;
        max-width: 800px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 30px;
      }
      
      .logo-box {
        width: 240px;
        height: 240px;
        border: 2px solid rgba(255, 255, 255, 0.85);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 35px;
        padding: 20px;
        background: rgba(11, 17, 32, 0.5);
        backdrop-filter: blur(6px);
        box-shadow: 0 0 35px rgba(255, 255, 255, 0.1);
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        animation: revealDown 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }
      .logo-box:hover {
        transform: scale(1.04);
        border-color: #ffffff;
        box-shadow: 0 0 45px rgba(255, 255, 255, 0.2);
      }
      .logo-box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .intro-content h1 {
        font-size: 72px;
        font-weight: 700;
        letter-spacing: 8px;
        margin-bottom: 15px;
        color: #ffffff;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
      }
      .intro-content p {
        max-width: 650px;
        line-height: 1.8;
        font-size: 19px;
        color: #e2e8f0;
        margin-bottom: 45px;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }
    
      .main-btn {
        text-decoration: none;
        color: white;
        border: 2px solid white;
        padding: 15px 40px;
        font-size: 18px;
        display: inline-block;
        background: transparent;
        transition: 0.3s ease;
        animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
      }
      .main-btn:hover {
        background: white;
        color: black;
      }

      @media (max-width: 768px) {
        .intro-content h1 {
          font-size: 54px;
          letter-spacing: 6px;
        }
        .intro-content p {
          font-size: 17px;
          margin-bottom: 35px;
        }
        .logo-box {
          width: 170px;
          height: 170px;
          margin-bottom: 25px;
        }
        .main-btn {
          padding: 12px 35px;
          font-size: 17px;
        }
      }

      @media (max-width: 480px) {
        .intro-content h1 {
          font-size: 42px;
          letter-spacing: 4px;
        }
        .intro-content p {
          font-size: 15px;
          line-height: 1.6;
        }
        .logo-box {
          width: 130px;
          height: 130px;
        }
        .main-btn {
          padding: 12px 30px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="intro-page">
      <div class="overlay"></div>
      <div class="intro-container">
        <div class="logo-box">
          <img src="./image/SURAKA LOGO.webp" alt="SURAKA Corporate Logo" />
        </div>
        <div class="intro-content">
          <h1>YUVAKAR</h1>
          <p>
            Discover luxury properties, smart investments, and curated real estate
            opportunities designed for modern living and long-term growth.
          </p>
          <a href="homepage.html" class="main-btn">Explore Properties</a>
        </div>
      </div>
    </div>
  </body>
</html>
